<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK CPA Command Center</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: auto;
        }

        /* =========================
           PREMIUM HEADER
        ========================== */

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .brand-logo img {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            box-shadow: 0 0 20px rgba(255,255,255,0.08);
        }

        .brand-text h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
        }

        .brand-text p {
            margin: 4px 0 0;
            font-size: 14px;
            color: #9ca3af;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            border: none;
            padding: 12px 22px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 10px;
        }

        /* Last updated */

        .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        #last-updated {
            color: #64748b;
            font-size: 13px;
        }

        /* Loading */

        #loading {
            position: fixed;
            inset: 0;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #94a3b8;
            z-index: 100;
        }

        #loading.hidden {
            display: none;
        }

        /* Error banner */

        #error-banner {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        /* Cards */

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
            margin-bottom: 36px;
        }

        .card {
            background: #1e293b;
            padding: 22px 24px;
            border-radius: 14px;
        }

        .card h3 {
            color: #94a3b8;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .card h2 {
            font-size: 26px;
        }

        /* Charts */

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(440px, 1fr));
            gap: 20px;
            margin-bottom: 36px;
        }

        .chart-box {
            background: #1e293b;
            padding: 22px;
            border-radius: 14px;
        }

        .chart-box h2 {
            margin-bottom: 18px;
            font-size: 17px;
        }

        /* Table */

        .table-box {
            background: #1e293b;
            padding: 22px;
            border-radius: 14px;
            overflow-x: auto;
        }

        .table-box h2 {
            margin-bottom: 16px;
            font-size: 17px;
        }

        table {
            width: 100%;
            min-width: 800px;
            border-collapse: collapse;
        }

        th {
            background: #334155;
            padding: 12px 14px;
            text-align: left;
            font-size: 13px;
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid #1e293b;
            font-size: 13px;
        }

        tr:hover td {
            background: #273449;
        }

        /* Status */

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-approved {
            background: #14532d;
            color: #86efac;
        }

        .status-pending {
            background: #78350f;
            color: #fde68a;
        }

        .status-rejected {
            background: #7f1d1d;
            color: #fca5a5;
        }

        /* Mobile */

        @media(max-width: 768px) {
            .charts {
                grid-template-columns: 1fr;
            }

            .top-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .brand-text h1 {
                font-size: 22px;
            }

            .brand-logo img {
                width: 52px;
                height: 52px;
            }
        }
    </style>
</head>
<body>

<div id="loading">⏳ Loading live data...</div>

<div class="container">

    <!-- PREMIUM HEADER -->

    <div class="top-header">

        <div class="brand-logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="SK CPA Logo">

            <div class="brand-text">
                <h1>SK CPA Command Center</h1>
                <p>Luxury Affiliate Dashboard</p>
            </div>
        </div>

        <button onclick="loadStats()" class="refresh-btn">
            🔄 Refresh
        </button>

    </div>

    <div class="subtitle">
        Live Affiliate Dashboard
    </div>

    <div class="topbar">
        <span id="last-updated">Fetching...</span>
    </div>

    <div id="error-banner"></div>

    <!-- SUMMARY CARDS -->

    <div class="cards">
        <div class="card">
            <h3>💰 Total Revenue</h3>
            <h2 id="c-revenue">—</h2>
        </div>

        <div class="card">
            <h3>📊 Total Leads</h3>
            <h2 id="c-leads">—</h2>
        </div>

        <div class="card">
            <h3>✅ Approved Leads</h3>
            <h2 id="c-approved">—</h2>
        </div>

        <div class="card">
            <h3>⏳ Pending Leads</h3>
            <h2 id="c-pending">—</h2>
        </div>

        <div class="card">
            <h3>🌐 Best Network</h3>
            <h2 id="c-network">—</h2>
        </div>

        <div class="card">
            <h3>🌍 Top GEO</h3>
            <h2 id="c-geo">—</h2>
        </div>
    </div>

</div>

</body>
</html>
